services:
  - type: web
    name: vidsnap-download
    runtime: python
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: gunicorn --worker-class gevent --workers 2 --threads 4 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12